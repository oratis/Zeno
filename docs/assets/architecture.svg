  <text x="76" y="277" font-size="9.5" fill="var(--color-text-secondary, #6b7280)">意图 · 约束 · 推断</text>

  <rect x="147" y="240" width="112" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="203" y="262" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">检索</text>
  <text x="203" y="277" font-size="9.5" fill="var(--color-text-secondary, #6b7280)">混合召回</text>

  <rect x="274" y="240" width="112" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="330" y="262" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">排序</text>
  <text x="330" y="277" font-size="9.5" fill="var(--color-text-secondary, #6b7280)">多目标</text>

  <rect x="401" y="240" width="112" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="457" y="269" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">记忆 / 画像</text>

  <rect x="528" y="240" width="112" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="584" y="269" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">履约 / 归因</text>

  <rect x="130" y="332" width="280" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="270" y="356" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">商品知识图谱 + 索引</text>
  <text x="270" y="371" font-size="10" fill="var(--color-text-secondary, #6b7280)">向量 · 结构 · 全文 · KG</text>

  <rect x="470" y="332" width="170" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="555" y="356" font-size="13" font-weight="600" fill="var(--color-text-primary, #1a1d24)">联盟 / 支付</text>
  <text x="555" y="371" font-size="10" fill="var(--color-text-secondary, #6b7280)">CPS · ACP · 卡组织</text>

  <rect x="130" y="420" width="280" height="46" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="270" y="441" font-size="12.5" font-weight="600" fill="var(--color-text-primary, #1a1d24)">供给数据管道</text>
  <text x="270" y="456" font-size="9.5" fill="var(--color-text-secondary, #6b7280)">标准化 → 富化 → 去重 → 质检</text>

  <text x="20" y="496" font-size="10" text-anchor="start" fill="var(--color-text-secondary, #6b7280)">蓝色描边 = AI / 编排核心　·　实线 = 请求链路　·　虚线框 = 离线管道</text>
</svg>
