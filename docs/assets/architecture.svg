  <text x="340" y="197" font-size="10.5" fill="var(--color-text-secondary, #6b7280)">Agent Loop · 工具调度</text>

  <rect x="520" y="160" width="140" height="48" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-text-info, #2f6fed)" stroke-width="2"/>
  <text x="590" y="182" font-size="12.5" font-weight="700" fill="var(--color-text-primary, #1a1d24)">AI Gateway</text>
  <text x="590" y="197" font-size="9" fill="var(--color-text-secondary, #6b7280)">分级模型 · 缓存 · 降级</text>

  <rect x="20"  y="240" width="112" height="50" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
