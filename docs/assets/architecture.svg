<svg width="100%" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img" font-family="var(--font-sans, system-ui, sans-serif)" text-anchor="middle">
  <title>Zeno 系统架构</title>
  <desc>分层架构：客户端 → 接入层 → 对话编排（与 AI Gateway 互联）→ 需求理解 / 检索 / 排序 / 记忆 / 履约 → 商品知识图谱索引与联盟支付；供给数据管道汇入索引。</desc>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--color-text-secondary, #6b7280)"/>
    </marker>
  </defs>

  <g stroke="var(--color-text-secondary, #6b7280)" stroke-width="1.5" fill="none">
    <line x1="340" y1="68"  x2="340" y2="89"  marker-end="url(#ah)"/>
    <line x1="340" y1="136" x2="340" y2="157" marker-end="url(#ah)"/>
    <line x1="340" y1="208" x2="340" y2="225" marker-end="url(#ah)"/>
    <line x1="76" y1="228" x2="584" y2="228"/>
    <line x1="76"  y1="228" x2="76"  y2="237" marker-end="url(#ah)"/>
    <line x1="203" y1="228" x2="203" y2="237" marker-end="url(#ah)"/>
    <line x1="330" y1="228" x2="330" y2="237" marker-end="url(#ah)"/>
    <line x1="457" y1="228" x2="457" y2="237" marker-end="url(#ah)"/>
    <line x1="584" y1="228" x2="584" y2="237" marker-end="url(#ah)"/>
    <line x1="225" y1="290" x2="248" y2="330" marker-end="url(#ah)"/>
    <line x1="330" y1="290" x2="305" y2="330" marker-end="url(#ah)"/>
    <line x1="584" y1="290" x2="562" y2="330" marker-end="url(#ah)"/>
    <line x1="270" y1="420" x2="270" y2="385" marker-end="url(#ah)"/>
  </g>
  <line x1="490" y1="184" x2="518" y2="184" stroke="var(--color-text-info, #2f6fed)" stroke-width="1.6" marker-end="url(#ah)" marker-start="url(#ah)"/>

  <rect x="140" y="24" width="400" height="44" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="340" y="44" font-size="13.5" font-weight="600" fill="var(--color-text-primary, #1a1d24)">客户端 Clients</text>
  <text x="340" y="59" font-size="10.5" fill="var(--color-text-secondary, #6b7280)">Web · App · 小程序 · 浏览器助手</text>

  <rect x="140" y="92" width="400" height="44" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-border-secondary, #d7dbe0)" stroke-width="1.5"/>
  <text x="340" y="112" font-size="13.5" font-weight="600" fill="var(--color-text-primary, #1a1d24)">接入层 BFF / Gateway</text>
  <text x="340" y="127" font-size="10.5" fill="var(--color-text-secondary, #6b7280)">鉴权 · 区域路由 · 流式</text>

  <rect x="190" y="160" width="300" height="48" rx="8" fill="var(--bg2, #f4f5f7)" stroke="var(--color-text-info, #2f6fed)" stroke-width="2"/>
